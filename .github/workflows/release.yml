name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: configure maven credentials
        env:
          REPOSILITE_USERNAME: ${{ secrets.REPOSILITE_USERNAME }}
          REPOSILITE_PASSWORD: ${{ secrets.REPOSILITE_PASSWORD }}
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" <<EOF
          <settings>
            <servers>
              <server>
                <id>tsukure-releases</id>
                <username>${REPOSILITE_USERNAME}</username>
                <password>${REPOSILITE_PASSWORD}</password>
              </server>
              <server>
                <id>tsukure-snapshots</id>
                <username>${REPOSILITE_USERNAME}</username>
                <password>${REPOSILITE_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: test
        run: ./mvnw -B clean test

      - name: set release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./mvnw -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: deploy to maven
        run: ./mvnw -B deploy -DskipTests

      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            target/fastbus-"$VERSION".jar \
            target/fastbus-"$VERSION"-sources.jar \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
